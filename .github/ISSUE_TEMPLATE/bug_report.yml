name: Bug report
description: Report a bug or issue
title: "[Bug]: "
labels: [bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: If applicable, add error logs or screenshots
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Examples:
        - OS: Ubuntu 22.04
        - Node: 18.17.1
        - Browser: Chrome 119
      placeholder: |
        - OS: 
        - Node version:
        - Browser (if applicable):
    validations:
      required: true
