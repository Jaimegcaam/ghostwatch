{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ghostwatch.fullname" . }}-secrets
  labels:
    {{- include "ghostwatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ required "secrets.authSecret is required (openssl rand -base64 32)" .Values.secrets.authSecret | quote }}
  CRON_SECRET: {{ required "secrets.cronSecret is required (openssl rand -base64 32)" .Values.secrets.cronSecret | quote }}
  DATABASE_URL: {{ include "ghostwatch.databaseUrl" . | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ required "postgres.password is required when postgres.enabled=true" .Values.postgres.password | quote }}
  {{- end }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.google.clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.google.clientSecret | quote }}
  GITHUB_ID: {{ .Values.secrets.github.id | quote }}
  GITHUB_SECRET: {{ .Values.secrets.github.secret | quote }}
{{- end }}
