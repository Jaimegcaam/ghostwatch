apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ghostwatch-uploads
  namespace: ghostwatch
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ghostwatch-app
  namespace: ghostwatch
  labels:
    app.kubernetes.io/name: ghostwatch-app
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: ghostwatch-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostwatch-app
  namespace: ghostwatch
  labels:
    app.kubernetes.io/name: ghostwatch-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ghostwatch-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ghostwatch-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: app
          image: ghcr.io/ghostwatch/ghostwatch:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            # POSTGRES_PASSWORD must be declared before DATABASE_URL so that
            # Kubernetes can expand the $(POSTGRES_PASSWORD) reference below.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghostwatch-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://ghostwatch:$(POSTGRES_PASSWORD)@ghostwatch-postgres:5432/ghostwatch?schema=public"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef: { name: ghostwatch-secrets, key: AUTH_SECRET }
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef: { name: ghostwatch-secrets, key: CRON_SECRET }
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef: { name: ghostwatch-secrets, key: RESEND_API_KEY }
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: ghostwatch-secrets, key: GOOGLE_CLIENT_ID }
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: ghostwatch-secrets, key: GOOGLE_CLIENT_SECRET }
            - name: GITHUB_ID
              valueFrom:
                secretKeyRef: { name: ghostwatch-secrets, key: GITHUB_ID }
            - name: GITHUB_SECRET
              valueFrom:
                secretKeyRef: { name: ghostwatch-secrets, key: GITHUB_SECRET }
          envFrom:
            - configMapRef:
                name: ghostwatch-config
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: ghostwatch-uploads
