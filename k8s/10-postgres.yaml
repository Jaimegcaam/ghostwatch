apiVersion: v1
kind: Service
metadata:
  name: ghostwatch-postgres
  namespace: ghostwatch
  labels:
    app.kubernetes.io/name: ghostwatch-postgres
spec:
  clusterIP: None
  ports:
    - port: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: ghostwatch-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ghostwatch-postgres
  namespace: ghostwatch
  labels:
    app.kubernetes.io/name: ghostwatch-postgres
spec:
  serviceName: ghostwatch-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ghostwatch-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ghostwatch-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: ghostwatch
            - name: POSTGRES_DB
              value: ghostwatch
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghostwatch-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ghostwatch", "-d", "ghostwatch"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "ghostwatch", "-d", "ghostwatch"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
